<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unreliable 8-Ball</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto app-bg">
    <div class="stars" id="stars-container"></div>

    <div class="min-h-full flex flex-col items-center justify-center p-6 relative z-10">

      <h1 id="title" class="font-creepster text-3xl md:text-4xl text-center mb-2 title-style">
        The Unreliable 8-Ball
      </h1>

      <p id="subtitle" class="font-poppins text-sm mb-10 text-center subtitle-style">
        Ask a question... if you dare
      </p>

      <div class="ball-container mb-8" id="ball-container">
        <div class="cube" id="cube">

          <div class="cube-face cube-front" id="answer-text">8</div>
          <div class="cube-face cube-back">?</div>
          <div class="cube-face cube-right">!</div>
          <div class="cube-face cube-left">✨</div>
          <div class="cube-face cube-top">🔮</div>
          <div class="cube-face cube-bottom">🌀</div>

        </div>
      </div>

      <button id="shake-btn"
        class="font-poppins font-semibold px-6 py-2 rounded-full text-base transition-all duration-300 hover:scale-105 active:scale-95 shake-btn">
        🔮 Shake for Wisdom
      </button>

      <p id="disclaimer"
        class="font-poppins text-xs mt-8 text-center max-w-md opacity-60 disclaimer-style">
        ⚠️ Warning: This 8-ball has commitment issues, a faulty memory, and may have been cursed by a confused wizard.
      </p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
